---
name: Release
concurrency: changelog
on:
  release:
    types: [released]
permissions:
  contents: read
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: {python-version: '3.14'}
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false
      - name: Sync dependencies
        run: uv sync --frozen --group dev
      - name: Bump changelog and version files
        id: release
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          uv run changelogmanager release \
            --override-version "$VERSION" \
            --bump-versions \
            --yes
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Commit and push bump branch
        id: push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          BRANCH="release/bump-${RELEASE_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add CHANGELOG.md pyproject.toml
          git add -u
          if git diff --cached --quiet; then
            echo "::warning::No files changed after release --bump-versions; is the version already bumped?"
            exit 1
          fi
          git commit -m "chore: release ${RELEASE_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          REMOTE_SHA="$(git ls-remote --heads origin "${BRANCH}" | awk '{print $1}')"
          if [ -n "${REMOTE_SHA}" ]; then
            git push \
              --force-with-lease="refs/heads/${BRANCH}:${REMOTE_SHA}" \
              origin \
              "HEAD:refs/heads/${BRANCH}"
          else
            git push origin "HEAD:refs/heads/${BRANCH}"
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          BASE_BRANCH: ${{ github.event.release.target_commitish }}
          REPO: ${{ github.repository }}
          BUMP_BRANCH: ${{ steps.push.outputs.branch }}
        run: |
          uv run changelogmanager github-pr \
            --repository "${REPO}" \
            --head "${BUMP_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --title "chore: release ${RELEASE_VERSION}" \
            --body "$(cat <<EOF
          Automated release PR for **${RELEASE_VERSION}**.
          Changes:
          - \`CHANGELOG.md\`: promoted \`[Unreleased]\` to \`${RELEASE_VERSION}\`
          - \`pyproject.toml\`: version bumped to \`${RELEASE_VERSION}\`
          This PR was opened automatically by the Release workflow.
          Merge it once the PyPI publish below succeeds.
          EOF
          )"
  build-sdist:
    name: Build hissbytenotation source distribution
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - name: Verify sdist version matches release
        env:
          EXPECTED: ${{ needs.bump.outputs.version }}
        run: |
          SDIST=$(ls dist/*.tar.gz 2>/dev/null | head -1)
          if [ -z "$SDIST" ]; then
            echo "::error::No sdist found in dist/"
            exit 1
          fi
          if ! echo "$SDIST" | grep -q "${EXPECTED}"; then
            echo "::error::Sdist ${SDIST} does not contain expected version ${EXPECTED}"
            exit 1
          fi
          echo "Verified: ${SDIST} matches version ${EXPECTED}"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: hissbytenotation-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1
  build-rust-wheels:
    name: hissbytenotation wheels / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: windows-amd64
            os: windows-latest
          - name: macos-x86_64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
        with:
          package-dir: rust
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: native
          CIBW_ENVIRONMENT: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_ENVIRONMENT_MACOS: ${{ matrix.name == 'macos-x86_64' && 'PATH="$HOME/.cargo/bin:$PATH" MACOSX_DEPLOYMENT_TARGET=10.12' || 'PATH="$HOME/.cargo/bin:$PATH"' }}
          CIBW_BEFORE_BUILD: "pip install maturin"
          CIBW_BEFORE_BUILD_LINUX: >
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            pip install maturin
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rust-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 1
  publish:
    name: Publish hissbytenotation to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-rust-wheels]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/hissbytenotation
    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: hissbytenotation-sdist
          path: dist/
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: rust-wheels-*
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          verbose: 'true'
