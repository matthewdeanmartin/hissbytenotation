name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build the pure-Python source distribution used as the fallback install path.
  build-sdist:
    name: Build hissbytenotation source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hissbytenotation-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  # Build hissbytenotation wheels that bundle the optional Rust extension.
  build-rust-wheels:
    name: hissbytenotation wheels / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: windows-amd64
            os: windows-latest
          - name: macos-x86_64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: rust
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: native
          CIBW_ENVIRONMENT: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_ENVIRONMENT_MACOS: ${{ matrix.name == 'macos-x86_64' && 'PATH="$HOME/.cargo/bin:$PATH" MACOSX_DEPLOYMENT_TARGET=10.12' || 'PATH="$HOME/.cargo/bin:$PATH"' }}
          CIBW_BEFORE_BUILD: "pip install maturin"
          CIBW_BEFORE_BUILD_LINUX: >
            curl https://sh.rustup.rs -sSf | sh -s -- -y &&
            pip install maturin

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: rust-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish hissbytenotation to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hissbytenotation
    permissions:
      id-token: write
    needs: [build-sdist, build-rust-wheels]
    steps:
      - name: Fail if not main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual publish must run from main."
          exit 1

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: hissbytenotation-sdist
          path: dist/

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rust-wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
